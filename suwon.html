<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-BALLOG - 수원 지역 리그</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
                <div class="logo-icons">
                    <i class="fas fa-futbol soccer-ball-icon logo-icon"></i>
                    <i class="fas fa-chart-line data-icon logo-icon"></i>
                </div>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html">홈</a></li>
                    <li><a href="match.html">경기</a></li>
                    <li><a href="search.html">검색</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="location-selector">
                    <label for="location-select">지역 선택</label>
                    <div class="location-select-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="location-select">
                            <option value="seoul.html">서울</option>
                            <option value="suwon.html" selected>수원</option>
                            <option value="incheon.html">인천</option>
                            <option value="yongin.html">용인</option>
                        </select>
                    </div>
                </div>
                <button class="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="category-section">
            <h2 class="section-heading"><i class="fas fa-trophy"></i> 수원 아마추어 리그</h2>
            <div class="unified-grid">
                <!-- K5 League -->
                <a href="suwon-k5.html" class="unified-card">
                    <div class="unified-card-content">
                        <h3>수원 K5 리그</h3>
                        <p>수원 최상위 아마추어 리그의 순위와 경기 정보를 확인하세요.</p>
                    </div>
                </a>
                <!-- K6 League -->
                <a href="suwon-k6.html" class="unified-card">
                    <div class="unified-card-content">
                        <h3>수원 K6 리그</h3>
                        <p>수원 K6 리그의 클럽별 소식과 경기 결과를 제공합니다.</p>
                    </div>
                </a>
                <!-- K7 League -->
                <a href="suwon-k7.html" class="unified-card">
                    <div class="unified-card-content">
                        <h3>수원 K7 리그</h3>
                        <p>수원 전역에서 펼쳐지는 K7 리그의 생생한 소식을 전달합니다.</p>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="#">회사 소개</a>
                <a href="#">이용 약관</a>
                <a href="#">개인정보 처리방침</a>
                <a href="#">문의하기</a>
            </div>
            <p>&copy; 2024 K-BALLOG. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
