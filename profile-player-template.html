<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>선수 프로필</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile-page.css">
</head>
<body>
    <div class="profile-container">
        <header class="profile-header">
            <img src="https://www.fupa.net/player/image/1024x768/viktoria-koeln-u19-2016-17.jpg" alt="선수 이미지" class="player-image">
            <div class="player-info">
                <div class="player-name-container">
                    <span class="player-number">#</span>
                    <span class="player-name">선수 이름</span>
                </div>
                <span class="player-position">포지션</span>
            </div>
        </header>

        <main class="profile-main">
            <aside class="player-details-sidebar">
                <h2 class="details-heading">기본 정보</h2>
                <ul class="details-list">
                    <li>
                        <span class="label">국적</span>
                        <span class="value">대한민국</span>
                    </li>
                    <li>
                        <span class="label">생년월일</span>
                        <span class="value">YYYY년 MM월 DD일</span>
                    </li>
                    <li>
                        <span class="label">키</span>
                        <span class="value">000 cm</span>
                    </li>
                    <li>
                        <span class="label">몸무게</span>
                        <span class="value">00 kg</span>
                    </li>
                    <li>
                        <span class="label">주발</span>
                        <span class="value">-</span>
                    </li>
                </ul>
            </aside>
            <section class="player-performance-content">
                <h2 class="performance-heading">시즌 기록</h2>
                <div class="performance-stats">
                    <div class="stat-item">
                        <span class="stat-value">0</span>
                        <span class="stat-label">경기</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">0</span>
                        <span class="stat-label">골</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">0</span>
                        <span class="stat-label">도움</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">0</span>
                        <span class="stat-label">경고</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">0</span>
                        <span class="stat-label">퇴장</span>
                    </div>
                </div>
                <h2 class="performance-heading" style="margin-top: 2rem;">선수 경력</h2>
                <ul class="details-list">
                     <li><span class="label">YYYY-YYYY</span> <span class="value">클럽명</span></li>
                </ul>
            </section>
        </main>
    </div>
</body>
</html>
