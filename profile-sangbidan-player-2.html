
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김미들 프로필 - K-BALLOG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo"><a href="index.html">K-BALLOG</a></div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="seoul.html">서울</a></li>
                    <li><a href="suwon.html">수원</a></li>
                    <li><a href="incheon.html">인천</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="profile-card card">
            <header class="profile-header">
                <img src="https://via.placeholder.com/120/1a1c23/f0f0f0?text=MF" alt="김미들" class="profile-picture">
                <div class="profile-info">
                    <h1 class="profile-name">김미들</h1>
                    <p class="profile-meta">미드필더</p>
                </div>
            </header>
            <div class="profile-body">
                <div class="profile-section">
                    <h3>선수 정보</h3>
                    <div class="profile-stats">
                        <div class="stat-item"><span>키</span><p>180cm</p></div>
                        <div class="stat-item"><span>몸무게</span><p>75kg</p></div>
                        <div class="stat-item"><span>주발</span><p>오른발</p></div>
                        <div class="stat-item"><span>고향</span><p>서울</p></div>
                    </div>
                </div>
                <div class="profile-section">
                    <h3>팀 경력</h3>
                    <ul class="career-list">
                        <li>성북구30대상비단 (2020~현재)</li>
                    </ul>
                </div>
                <div class="profile-section">
                    <h3>리그 기록</h3>
                    <div class="profile-stats">
                        <div class="stat-item"><span>경기</span><p>15</p></div>
                        <div class="stat-item"><span>골</span><p>5</p></div>
                        <div class="stat-item"><span>어시스트</span><p>3</p></div>
                        <div class="stat-item"><span>카드</span><p>1</p></div>
                    </div>
                </div>
            </div>
            <div class="profile-navigation">
                <a href="team-sangbidan.html" class="back-link"><i class="fas fa-arrow-left"></i> 팀 페이지로 돌아가기</a>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <p>&copy; 2024 K-BALLOG. All rights reserved.</p>
        </div>
    </footer>
</body>
</html>
