<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kenza El-Amrani 프로필</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile-page.css">
</head>
<body>
    <div class="profile-container">
        <header class="profile-header">
            <img src="https://randomuser.me/api/portraits/women/15.jpg" alt="Kenza El-Amrani" class="player-image">
            <div class="player-info">
                <div class="player-name-container">
                    <span class="player-name">Kenza El-Amrani</span>
                </div>
                <span class="player-position">수비수</span>
            </div>
        </header>

        <main class="profile-main">
            <aside class="player-details-sidebar">
                <h2 class="details-heading">기본 정보</h2>
                <ul class="details-list">
                    <li><span class="label">국적</span> <span class="value">모로코</span></li>
                    <li><span class="label">역할</span> <span class="value">수비수</span></li>
                    <li><span class="label">생년월일</span> <span class="value">1997년 9월 20일</span></li>
                    <li><span class="label">나이</span> <span class="value">26세</span></li>
                    <li><span class="label">키</span> <span class="value">173 cm</span></li>
                    <li><span class="label">몸무게</span> <span class="value">67 kg</span></li>
                </ul>
            </aside>
            <section class="player-performance-content">
                 <h2 class="performance-heading">클럽 경력</h2>
                 <ul class="details-list">
                    <li><span class="label">2016-2020</span> <span class="value">AS FAR</span></li>
                    <li><span class="label">2020-2023</span> <span class="value">Wydad AC</span></li>
                    <li><span class="label">2023-현재</span> <span class="value">Inter Vamos</span></li>
                 </ul>
                <div class="back-to-team">
                    <a href="team-inter-vamos.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> 팀으로 돌아가기</a>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
