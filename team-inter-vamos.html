<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inter Vamos 팀 프로필</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="team-page.css">
</head>
<body>
    <div class="team-profile-container">
        <header class="team-profile-header">
            <img src="https://raw.githubusercontent.com/jangwonbin20/K-BALLOG/main/Image/Inter-vamos-logo.png" alt="Inter Vamos 로고" class="team-logo">
            <div class="team-info">
                <h1>Inter Vamos</h1>
                <p class="team-description">
                    열정과 다양성이 만나 축구의 새로운 미래를 만들어가는 팀, Inter Vamos에 오신 것을 환영합니다.
                </p>
                <div class="team-meta">
                    <span><i class="fas fa-map-marker-alt"></i> 서울</span>
                    <span><i class="fas fa-users"></i> K5 리그</span>
                    <span><i class="fas fa-calendar-alt"></i> 2023년 창단</span>
                </div>
            </div>
        </header>

        <main class="team-squad-section">
            <section class="squad-category">
                <h2 class="section-heading"><i class="fas fa-users"></i> 선수단</h2>
                
                <h3><i class="fas fa-user-shield"></i> 감독</h3>
                <div class="player-grid">
                    <a href="profile-carlos.html" class="player-card-link">
                        <div class="player-card" style="background-image: url('https://randomuser.me/api/portraits/men/75.jpg');">
                            <div class="player-info-content">
                                <span class="player-name">Carlos</span>
                                <span class="player-position">감독</span>
                            </div>
                        </div>
                    </a>
                </div>

                <h3><i class="fas fa-shoe-prints"></i> 선수</h3>
                <div class="player-grid" id="players-grid"></div>
            </section>
        </main>
    </div>

    <script>
        const players = [
            { id: 1, name: 'Marco Rossi', position: '공격수', nat: '이탈리아', img: 'https://randomuser.me/api/portraits/men/1.jpg' },
            { id: 2, name: 'John Smith', position: '미드필더', nat: '미국', img: 'https://randomuser.me/api/portraits/men/2.jpg' },
            { id: 3, name: 'Yuki Tanaka', position: '수비수', nat: '일본', img: 'https://randomuser.me/api/portraits/men/3.jpg' },
            { id: 4, name: 'Carlos Gomez', position: '골키퍼', nat: '스페인', img: 'https://randomuser.me/api/portraits/men/4.jpg' },
            { id: 5, name: 'Alex Dubois', position: '공격수', nat: '프랑스', img: 'https://randomuser.me/api/portraits/men/5.jpg' },
            { id: 6, name: 'Ben Schmidt', position: '미드필더', nat: '독일', img: 'https://randomuser.me/api/portraits/men/6.jpg' },
            { id: 7, name: 'Leo Virtanen', position: '수비수', nat: '핀란드', img: 'https://randomuser.me/api/portraits/men/7.jpg' },
            { id: 8, name: 'Nikolai Petrenko', position: '미드필더', nat: '우크라이나', img: 'https://randomuser.me/api/portraits/men/8.jpg' },
            { id: 9, name: 'Mateo Kovac', position: '공격수', nat: '크로아티아', img: 'https://randomuser.me/api/portraits/men/9.jpg' },
            { id: 10, name: 'Omar Al-Farsi', position: '수비수', nat: '오만', img: 'https://randomuser.me/api/portraits/men/10.jpg' },
            { id: 11, name: 'Elif Aksoy', position: '미드필더', nat: '터키', img: 'https://randomuser.me/api/portraits/women/11.jpg' },
            { id: 12, name: 'Zahara Al-Zahrani', position: '수비수', nat: '사우디아라비아', img: 'https://randomuser.me/api/portraits/women/12.jpg' },
            { id: 13, name: 'Anja Novak', position: '공격수', nat: '슬로베니아', img: 'https://randomuser.me/api/portraits/women/13.jpg' },
            { id: 14, name: 'Isioma Okoro', position: '미드필더', nat: '나이지리아', img: 'https://randomuser.me/api/portraits/women/14.jpg' },
            { id: 15, name: 'Nia Jones', position: '수비수', nat: '웨일스', img: 'https://randomuser.me/api/portraits/women/15.jpg' },
            { id: 16, name: 'Sofia Reyes', position: '골키퍼', nat: '멕시코', img: 'https://randomuser.me/api/portraits/women/16.jpg' }
        ];

        const grid = document.getElementById('players-grid');
        players.forEach(player => {
            const profileUrl = `profile-player-${player.id}.html`;
            const playerCardLink = document.createElement('a');
            playerCardLink.href = profileUrl;
            playerCardLink.className = 'player-card-link';

            const playerCard = document.createElement('div');
            playerCard.className = 'player-card';
            playerCard.style.backgroundImage = `url('${player.img}')`;
            
            const playerInfoContent = document.createElement('div');
            playerInfoContent.className = 'player-info-content';
            
            const playerName = document.createElement('span');
            playerName.className = 'player-name';
            playerName.textContent = player.name;

            const playerPosition = document.createElement('span');
            playerPosition.className = 'player-position';
            playerPosition.textContent = player.position;

            playerInfoContent.appendChild(playerName);
            playerInfoContent.appendChild(document.createElement('br'));
            playerInfoContent.appendChild(playerPosition);
            playerCard.appendChild(playerInfoContent);
            playerCardLink.appendChild(playerCard);

            grid.appendChild(playerCardLink);
        });
    </script>
</body>
</html>
