
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-BALLOG - 권역 상세</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
                <div class="logo-icons">
                    <i class="fas fa-futbol soccer-ball-icon logo-icon"></i>
                    <i class="fas fa-chart-line data-icon logo-icon"></i>
                </div>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html">홈</a></li>
                    <li><a href="match.html">경기</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="main-content">
            <div class="featured-article card">
                <img id="district-image" src="" alt="대표 기사 이미지">
                <div class="article-content">
                    <span id="district-category" class="category"></span>
                    <h2 id="district-title"></h2>
                    <p id="district-description"></p>
                </div>
            </div>

            <div class="sidebar">
                <div class="card match-center">
                    <div class="card-header">
                        <h3 id="match-center-title"></h3>
                        <div class="tabs">
                            <button class="tab-link active" data-tab="results">최근 결과</button>
                            <button class="tab-link" data-tab="fixtures">예정된 경기</button>
                        </div>
                    </div>
                    <div id="results" class="tab-content active">
                        <!-- 경기 결과가 동적으로 추가될 영역 -->
                    </div>
                    <div id="fixtures" class="tab-content">
                        <!-- 예정된 경기가 동적으로 추가될 영역 -->
                    </div>
                </div>
            </div>
        </div>

        <section class="latest-articles-section">
            <h2 id="news-section-title"></h2>
            <div id="news-grid" class="articles-grid">
                <!-- 최신 뉴스가 동적으로 추가될 영역 -->
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
