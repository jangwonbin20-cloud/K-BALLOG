
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fc Creo - K-BALLOG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="seoul.html">서울</a></li>
                    <li><a href="suwon.html">수원</a></li>
                    <li><a href="incheon.html">인천</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" placeholder="검색...">
                    <button><i class="fas fa-search"></i></button>
                </div>
                <div class="hamburger"><i class="fas fa-bars"></i></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="team-profile-container">
            <header class="team-header card">
                <img src="https://via.placeholder.com/150/1a1c23/f0f0f0?text=CR" alt="Fc Creo 로고" class="team-logo">
                <div class="team-info">
                    <h1>Fc Creo</h1>
                    <p>서울특별시 성북구</p>
                </div>
                <a href="team-creo-roster.html" class="roster-link-btn">전체 선수단 보기 <i class="fas fa-arrow-right"></i></a>
            </header>

            <div class="team-main-content card">
                <div class="tabs">
                    <button class="tab-link active" data-tab="info">팀 정보</button>
                    <button class="tab-link" data-tab="results">경기 결과</button>
                </div>

                <div id="info" class="tab-content active">
                    <div class="team-section">
                        <h2>팀 정보</h2>
                        <p><strong>창단:</strong> 2022년</p>
                        <p><strong>연고지:</strong> 서울특별시 성북구</p>
                        <p><strong>홈 구장:</strong> 성북구립축구장</p>
                        <p><strong>감독:</strong> 김감독</p>
                    </div>
                </div>

                <div id="results" class="tab-content">
                    <div class="team-section">
                        <h2>최근 경기 결과</h2>
                        <div class="match-item">
                            <span>VS Fc 꼬레아</span>
                            <span class="score">1 : 0</span>
                            <span>승</span>
                        </div>
                        <div class="match-item">
                            <span>VS 서초구 Dice</span>
                            <span class="score">2 : 2</span>
                            <span>무</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="#">회사소개</a>
                <a href="#">서비스소개</a>
                <a href="#">이용약관</a>
                <a href="#">개인정보처리방침</a>
            </div>
            <p>&copy; 2024 K-BALLOG. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
