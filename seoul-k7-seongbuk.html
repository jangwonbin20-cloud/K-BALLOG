<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="league-page.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
                <div class="logo-icons">
                    <i class="fas fa-futbol soccer-ball-icon logo-icon"></i>
                    <i class="fas fa-chart-line data-icon logo-icon"></i>
                </div>
                <div class="location-selector">
                    <label for="location-select" data-translate="yourLocation">당신의 지역</label>
                    <div class="location-select-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="location-select">
                            <option value="" data-translate="select">선택</option>
                            <option value="seoul.html" data-translate="seoul">서울</option>
                            <option value="suwon.html" data-translate="suwon">수원</option>
                            <option value="incheon.html" data-translate="incheon">인천</option>
                            <option value="yongin.html" data-translate="yongin">용인</option>
                        </select>
                    </div>
                </div>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html" data-translate="navHome">홈</a></li>
                    <li><a href="match.html" data-translate="navMatches">경기</a></li>
                    <li><a href="search.html" data-translate="navSearch">검색</a></li>
                    <li><a href="news.html" data-translate="navNews">뉴스</a></li>
                    <li><a href="transfer.html" data-translate="navTransfer">이적</a></li>
                    <li><a href="community.html" data-translate="navCommunity">커뮤니티</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="auth-buttons">
                    <a href="signup.html" class="btn btn-primary" id="signup-btn-main">회원가입</a>
                    <a href="#" class="btn" id="login-btn-main">로그인</a>
                </div>
                <div class="user-info hidden">
                    <span id="user-name-display"></span>
                    <a href="#" class="btn" id="logout-btn">로그아웃</a>
                </div>
                <div class="language-selector">
                    <div class="language-select-wrapper">
                        <i class="fas fa-globe"></i>
                        <select id="language-select">
                            <option value="ko">한국어</option>
                            <option value="en">English</option>
                            <option value="de">Deutsch</option>
                            <option value="es">Español</option>
                            <option value="ja">日本語</option>
                        </select>
                    </div>
                </div>
                <span class="mobile-location-label" data-translate="yourLocationMobile">당신의 지역:</span>
                <button class="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="league-title-section card">
            <img src="https://images.unsplash.com/photo-1559024926-04d33a5ade8b?q=80&w=2070&auto=format&fit=crop" alt="K7 League Cover" class="league-cover-image">
            <div class="league-title-content">
                <h1><i class="fas fa-trophy"></i> K7 League - Seongbuk</h1>
                <p>성북구의 자존심을 건 치열한 승부</p>
            </div>
        </section>

        <section class="card league-data-section">
            <div class="tab-navigation">
                <button class="tab-btn active" data-tab="ranking"><i class="fas fa-trophy"></i> 리그 순위</button>
                <button class="tab-btn" data-tab="schedule"><i class="fas fa-calendar-alt"></i> 경기 일정/결과</button>
                <button class="tab-btn" data-tab="stats"><i class="fas fa-chart-bar"></i> 개인 기록</button>
            </div>

            <div id="ranking" class="tab-content active">
                <div class="league-table-section">
                    <table class="league-table">
                        <thead>
                            <tr>
                                <th>순위</th>
                                <th>팀</th>
                                <th>경기</th>
                                <th>승점</th>
                                <th>승</th>
                                <th>무</th>
                                <th>패</th>
                                <th>득실차</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 순위 데이터는 여기에 동적으로 추가됩니다 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <div id="schedule" class="tab-content">
                <div class="match-list-section">
                     <!-- 경기 일정 데이터는 여기에 동적으로 추가됩니다 -->
                </div>
            </div>

            <div id="stats" class="tab-content">
                <div class="stats-table-section">
                    <h4><i class="fas fa-futbol"></i> 득점 순위</h4>
                    <!-- 득점 순위 테이블 -->
                     <table class="league-table">
                        <thead>
                            <tr>
                                <th>순위</th>
                                <th>선수</th>
                                <th>팀</th>
                                <th>골</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- 득점 순위 데이터 -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <div class="card team-list-section">
            <h2><i class="fas fa-users"></i> 참가 팀</h2>
            <div class="team-grid">
                <a href="team-sangbidan.html" class="team-card">
                    <img src="https://via.placeholder.com/150/FF5733/FFFFFF?text=SB" alt="성북구30대상비단">
                    <span>성북구30대상비단</span>
                </a>
                <a href="team-yangji.html" class="team-card">
                    <img src="https://via.placeholder.com/150/33FF57/FFFFFF?text=YJ" alt="양지">
                    <span>양지</span>
                </a>
                <a href="team-creo.html" class="team-card">
                    <img src="https://via.placeholder.com/150/3357FF/FFFFFF?text=CR" alt="Fc Creo">
                    <span>Fc Creo</span>
                </a>
                <a href="team-dream.html" class="team-card">
                    <img src="https://via.placeholder.com/150/F3FF33/FFFFFF?text=DR" alt="DREAM">
                    <span>DREAM</span>
                </a>
                <a href="team-corea.html" class="team-card">
                    <img src="https://via.placeholder.com/150/FF33A1/FFFFFF?text=CO" alt="Fc 꼬레아">
                    <span>Fc 꼬레아</span>
                </a>
                 <a href="team-dice.html" class="team-card">
                    <img src="https://via.placeholder.com/150/33FFF6/FFFFFF?text=DI" alt="서초구 Dice">
                    <span>서초구 Dice</span>
                </a>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="#">회사 소개</a>
                <a href="#">이용 약관</a>
                <a href="#">개인정보 처리방침</a>
                <a href="contact.html">문의하기</a>
            </div>
            <p>&copy; 2024 K-BALLOG. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
    <script>
        // Tab functionality
        const tabContainer = document.querySelector('.league-data-section');
        if (tabContainer) {
            const tabButtons = tabContainer.querySelectorAll('.tab-btn');
            const tabContents = tabContainer.querySelectorAll('.tab-content');

            tabButtons.forEach(button => {
                button.addEventListener('click', () => {
                    const tabName = button.dataset.tab;

                    // Deactivate all buttons and content
                    tabButtons.forEach(btn => btn.classList.remove('active'));
                    tabContents.forEach(content => content.classList.remove('active'));

                    // Activate the clicked button and corresponding content
                    button.classList.add('active');
                    document.getElementById(tabName).classList.add('active');
                });
            });
        }
    </script>
</body>
</html>
