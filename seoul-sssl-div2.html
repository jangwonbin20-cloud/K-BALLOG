
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-BALLOG - 서울 SSSL 디비전 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="league-page.css">
    <style>
        .admin-controls {
            padding: 15px;
            margin-bottom: 20px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            text-align: right;
        }
        .edit-input {
            width: 50px;
            text-align: center;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html">홈</a></li>
                    <li><a href="match.html">경기</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="league-title-section card">
            <img src="https://images.unsplash.com/photo-1551957997-27a3a5f09c12?q=80&w=2070&auto=format&fit=crop" alt="SSSL Division 2 Cover" class="league-cover-image">
            <div class="league-title-content">
                <h1><i class="fas fa-star"></i> SSSL Division 2</h1>
                <p>서울의 실력 있는 외국인 아마추어 팀들이 경쟁하는 리그</p>
            </div>
        </section>

        <div class="admin-controls">
            <button id="admin-mode-btn" class="btn">관리자 모드</button>
            <button id="save-changes-btn" class="btn btn-primary hidden">저장</button>
            <button id="cancel-changes-btn" class="btn hidden">취소</button>
        </div>

        <section class="card league-data-section">
            <div class="tab-navigation">
                <button class="tab-btn" data-tab="ranking">리그 순위</button>
                <button class="tab-btn active" data-tab="schedule">경기 일정/결과</button>
                <button class="tab-btn" data-tab="stats">개인 기록</button>
            </div>

            <div id="ranking" class="tab-content">
                 </div>

            <div id="schedule" class="tab-content active">
                <div class="match-list-section">
                    </div>
            </div>

            <div id="stats" class="tab-content">
                <div class="stats-table-section">
                    <h4><i class="fas fa-futbol"></i> 득점 순위</h4>
                    <table class="league-table" id="goals-table">
                        <thead>
                            <tr>
                                <th>순위</th>
                                <th>선수</th>
                                <th>팀</th>
                                <th>골</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                    <form id="add-goal-form" class="add-player-form hidden" style="margin-top: 15px;">
                        <h5>신규 득점 기록 추가</h5>
                        <input type="text" placeholder="선수 이름" required>
                        <input type="text" placeholder="팀 이름" required>
                        <input type="number" placeholder="골" required>
                        <button type="submit" class="btn btn-sm">추가</button>
                    </form>

                    <h4 class="mt-4"><i class="fas fa-hands-helping"></i> 도움 순위</h4>
                    <table class="league-table" id="assists-table">
                        <thead>
                            <tr>
                                <th>순위</th>
                                <th>선수</th>
                                <th>팀</th>
                                <th>도움</th>
                            </tr>
                        </thead>
                        <tbody>
                            </tbody>
                    </table>
                    <form id="add-assist-form" class="add-player-form hidden" style="margin-top: 15px;">
                        <h5>신규 도움 기록 추가</h5>
                        <input type="text" placeholder="선수 이름" required>
                        <input type="text" placeholder="팀 이름" required>
                        <input type="number" placeholder="도움" required>
                        <button type="submit" class="btn btn-sm">추가</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2024 K-BALLOG. All rights reserved.</p>
    </footer>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
    const adminModeBtn = document.getElementById('admin-mode-btn');
    const saveChangesBtn = document.getElementById('save-changes-btn');
    const cancelChangesBtn = document.getElementById('cancel-changes-btn');

    const scheduleTab = document.getElementById('schedule');
    const statsTab = document.getElementById('stats');
    const addGoalForm = document.getElementById('add-goal-form');
    const addAssistForm = document.getElementById('add-assist-form');

    let adminMode = false;

    const initialData = {
        matches: [
            { date: '2024년 8월 31일', time: '14:00', location: '용산공원', home: 'FC INTS', away: 'Seoul Calcio F.C.', homeScore: 'vs', awayScore: '' },
            { date: '2024년 9월 7일', time: '14:00', location: '용산공원', home: 'Phoenix FC', away: 'Inter Vamos', homeScore: 'vs', awayScore: '' },
        ],
        goals: [
            { rank: 1, player: 'K. CICIRKO', team: 'Project Ball FC', goals: 6 },
            { rank: 2, player: 'B. GRUBE', team: 'CONQ', goals: 4 },
        ],
        assists: [
            { rank: 1, player: 'J. HOFMAN', team: 'Project Ball FC', assists: 4 },
            { rank: 2, player: 'L. BRITO', team: 'CONQ', assists: 3 },
        ]
    };

    function loadData() {
        const matches = JSON.parse(localStorage.getItem('sssl_div2_matches')) || initialData.matches;
        const goals = JSON.parse(localStorage.getItem('sssl_div2_goals')) || initialData.goals;
        const assists = JSON.parse(localStorage.getItem('sssl_div2_assists')) || initialData.assists;

        renderSchedule(matches);
        renderStats(goals, 'goals');
        renderStats(assists, 'assists');
    }

    function renderSchedule(matches) {
        const scheduleSection = scheduleTab.querySelector('.match-list-section');
        scheduleSection.innerHTML = '';
        const groupedByDate = matches.reduce((acc, match) => {
            if (!acc[match.date]) {
                acc[match.date] = [];
            }
            acc[match.date].push(match);
            return acc;
        }, {});

        for (const date in groupedByDate) {
            const groupEl = document.createElement('div');
            groupEl.className = 'match-date-group';
            groupEl.innerHTML = `<h3>${date}</h3>`;
            groupedByDate[date].forEach((match, index) => {
                const matchId = `${date}-${index}`;
                const scoreDisplay = match.homeScore === 'vs' ? 'vs' : `${match.homeScore} : ${match.awayScore}`;
                groupEl.innerHTML += `
                    <div class="match-list-item card" data-match-id="${matchId}">
                        <div class="match-info">
                            <span>${match.home}</span>
                            <span class="score">${scoreDisplay}</span>
                            <span>${match.away}</span>
                        </div>
                        <div class="match-details">
                            <span class="time">${match.time}</span> | <span class="location">${match.location}</span>
                        </div>
                    </div>
                `;
            });
            scheduleSection.appendChild(groupEl);
        }
    }

    function renderStats(stats, type) {
        const tableBody = document.getElementById(`${type}-table`).querySelector('tbody');
        tableBody.innerHTML = '';
        stats.sort((a, b) => b[type.slice(0, -1)] - a[type.slice(0, -1)]).forEach((stat, index) => {
            const rank = index + 1;
            const row = document.createElement('tr');
            row.setAttribute(`data-player-id`, `${type}-${rank}`);
            row.innerHTML = `
                <td>${rank}</td>
                <td>${stat.player}</td>
                <td>${stat.team}</td>
                <td class="stat-value">${stat[type.slice(0, -1)]}</td>
            `;
            tableBody.appendChild(row);
        });
    }

    function toggleAdminMode() {
        adminMode = !adminMode;
        adminModeBtn.textContent = adminMode ? '일반 모드' : '관리자 모드';
        saveChangesBtn.classList.toggle('hidden');
        cancelChangesBtn.classList.toggle('hidden');
        addGoalForm.classList.toggle('hidden');
        addAssistForm.classList.toggle('hidden');

        if (adminMode) {
            enableEditing();
        } else {
            disableEditing();
        }
    }

    function enableEditing() {
        // Edit scores
        document.querySelectorAll('.match-list-item').forEach(item => {
            const matchId = item.dataset.matchId;
            const matches = JSON.parse(localStorage.getItem('sssl_div2_matches')) || initialData.matches;
            const matchData = matches.find((m, i) => `${m.date}-${i}` === matchId);
            
            const scoreEl = item.querySelector('.score');
            if (matchData) {
                 const homeScore = matchData.homeScore === 'vs' ? '' : matchData.homeScore;
                 const awayScore = matchData.awayScore === 'vs' ? '' : matchData.awayScore;
                 scoreEl.innerHTML = `
                    <input type="number" class="edit-input home-score" value="${homeScore}" placeholder="홈"> :
                    <input type="number" class="edit-input away-score" value="${awayScore}" placeholder="원정">
                `;
            }
        });

        // Edit stats
        document.querySelectorAll('#stats-table tbody tr, #assists-table tbody tr').forEach(row => {
            const statValueEl = row.querySelector('.stat-value');
            const currentValue = statValueEl.textContent;
            statValueEl.innerHTML = `<input type="number" class="edit-input" value="${currentValue}">`;
        });
    }

    function disableEditing() {
        loadData(); // Re-render the original or saved data
    }
    
    function saveChanges() {
        // Save match scores
        const newMatches = [];
         document.querySelectorAll('.match-list-item').forEach(item => {
            const matchId = item.dataset.matchId;
            const matches = JSON.parse(localStorage.getItem('sssl_div2_matches')) || initialData.matches;
            const matchIndex = matches.findIndex((m, i) => `${m.date}-${i}` === matchId);
            if(matchIndex !== -1) {
                const homeScore = item.querySelector('.home-score').value || 'vs';
                const awayScore = item.querySelector('.away-score').value || '';
                const originalMatch = matches[matchIndex];
                newMatches.push({ ...originalMatch, homeScore: homeScore, awayScore: awayScore });
            }
        });
        localStorage.setItem('sssl_div2_matches', JSON.stringify(newMatches));

        // Save goal stats
        const newGoals = [];
        document.querySelectorAll('#goals-table tbody tr').forEach(row => {
            const player = row.cells[1].textContent;
            const team = row.cells[2].textContent;
            const goals = row.querySelector('.edit-input').value;
            newGoals.push({ player, team, goals: parseInt(goals) });
        });
        localStorage.setItem('sssl_div2_goals', JSON.stringify(newGoals));

        // Save assist stats
        const newAssists = [];
        document.querySelectorAll('#assists-table tbody tr').forEach(row => {
            const player = row.cells[1].textContent;
            const team = row.cells[2].textContent;
            const assists = row.querySelector('.edit-input').value;
            newAssists.push({ player, team, assists: parseInt(assists) });
        });
        localStorage.setItem('sssl_div2_assists', JSON.stringify(newAssists));

        toggleAdminMode();
    }

    addGoalForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const inputs = e.target.elements;
        const goals = JSON.parse(localStorage.getItem('sssl_div2_goals')) || initialData.goals;
        goals.push({
            player: inputs[0].value,
            team: inputs[1].value,
            goals: parseInt(inputs[2].value)
        });
        localStorage.setItem('sssl_div2_goals', JSON.stringify(goals));
        renderStats(goals, 'goals');
        e.target.reset();
    });

    addAssistForm.addEventListener('submit', (e) => {
        e.preventDefault();
        const inputs = e.target.elements;
        const assists = JSON.parse(localStorage.getItem('sssl_div2_assists')) || initialData.assists;
        assists.push({
            player: inputs[0].value,
            team: inputs[1].value,
            assists: parseInt(inputs[2].value)
        });
        localStorage.setItem('sssl_div2_assists', JSON.stringify(assists));
        renderStats(assists, 'assists');
        e.target.reset();
    });


    adminModeBtn.addEventListener('click', toggleAdminMode);
    saveChangesBtn.addEventListener('click', saveChanges);
    cancelChangesBtn.addEventListener('click', () => {
        toggleAdminMode();
        loadData();
    });
    
    // Initial Load
    loadData();
});
    </script>
</body>
</html>
