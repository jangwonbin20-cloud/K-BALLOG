<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-BALLOG - 이메일 인증</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="signup-page-container">
        <div class="signup-form-container">
            <h1>이메일 인증</h1>
            <p><span id="user-email-display"></span>(으)로 전송된 인증 코드를 입력해주세요.</p>
            <p><strong>인증 코드: <span id="verification-code-display"></span></strong></p>
            <form id="verify-form">
                <div class="form-group">
                    <label for="verify-code">인증 코드</label>
                    <input type="text" id="verify-code" required>
                </div>
                <button type="submit" class="btn btn-primary">인증하기</button>
            </form>
        </div>
    </main>

    <script src="main.js"></script>
</body>
</html>
