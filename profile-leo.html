<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo 프로필</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile-page.css">
</head>
<body>
    <div class="profile-container">
        <header class="profile-header">
            <img src="https://via.placeholder.com/300x400.png?text=Leo" alt="선수 이미지" class="player-image">
            <div class="player-info">
                <div class="player-name-container">
                    <span class="player-number">#8</span>
                    <span class="player-name">Leo</span>
                </div>
                <span class="player-position">미드필더</span>
            </div>
        </header>

        <main class="profile-main">
            <aside class="player-details-sidebar">
                <h2 class="details-heading">기본 정보</h2>
                <ul class="details-list">
                    <li>
                        <span class="label">국적</span>
                        <span class="value">아르헨티나</span>
                    </li>
                    <li>
                        <span class="label">생년월일</span>
                        <span class="value">1999년 1월 15일</span>
                    </li>
                    <li>
                        <span class="label">키</span>
                        <span class="value">175 cm</span>
                    </li>
                    <li>
                        <span class="label">몸무게</span>
                        <span class="value">70 kg</span>
                    </li>
                    <li>
                        <span class="label">주발</span>
                        <span class="value">오른발</span>
                    </li>
                </ul>
            </aside>
            <section class="player-performance-content">
                <h2 class="performance-heading">시즌 기록</h2>
                <div class="performance-stats">
                    <div class="stat-item">
                        <span class="stat-value">18</span>
                        <span class="stat-label">경기</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">5</span>
                        <span class="stat-label">골</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">7</span>
                        <span class="stat-label">도움</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">4</span>
                        <span class="stat-label">경고</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">0</span>
                        <span class="stat-label">퇴장</span>
                    </div>
                </div>
                <h2 class="performance-heading" style="margin-top: 2rem;">선수 경력</h2>
                <ul class="details-list">
                     <li><span class="label">2023-현재</span> <span class="value">Inter Vamos</span></li>
                </ul>
            </section>
        </main>
    </div>
</body>
</html>
