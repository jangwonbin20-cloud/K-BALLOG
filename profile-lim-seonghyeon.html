<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>임성현 선수 프로필</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile-page.css">
</head>
<body>
    <div class="profile-container">
        <header class="profile-header">
            <img src="https://i.namu.wiki/i/4d_2vlm-p6q22P532rO0l6aY4-3-L2sBv6ytr8g6nqYtYBA0agPz1ZpTtkP40B5r-_2NfCj9f2D83LE0y2v49w.webp" alt="임성현" class="player-image">
            <div class="player-info">
                <div class="player-name-container">
                    <span class="player-number">1</span>
                    <h1 class="player-name">임성현</h1>
                </div>
                <span class="player-position">골키퍼</span>
            </div>
        </header>

        <main class="profile-main">
            <aside class="player-details-sidebar">
                <h2 class="details-heading">선수 정보</h2>
                <ul class="details-list">
                    <li>
                        <span class="label">국적</span>
                        <span class="value">대한민국</span>
                    </li>
                    <li>
                        <span class="label">생년월일</span>
                        <span class="value">1998년 3월 21일</span>
                    </li>
                    <li>
                        <span class="label">키</span>
                        <span class="value">188 cm</span>
                    </li>
                    <li>
                        <span class="label">몸무게</span>
                        <span class="value">82 kg</span>
                    </li>
                </ul>
            </aside>
            <section class="player-performance-content">
                <h2 class="performance-heading">능력치</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label"><span>반사신경</span><span>88</span></div>
                        <div class="stat-bar"><div class="stat-bar-fill" style="width: 88%;"></div></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label"><span>볼 핸들링</span><span>82</span></div>
                        <div class="stat-bar"><div class="stat-bar-fill" style="width: 82%;"></div></div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label"><span>위치 선정</span><span>85</span></div>
                        <div class="stat-bar"><div class="stat-bar-fill" style="width: 85%;"></div></div>
                    </div>
                     <div class="stat-item">
                        <div class="stat-label"><span>패스</span><span>75</span></div>
                        <div class="stat-bar"><div class="stat-bar-fill" style="width: 75%;"></div></div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
