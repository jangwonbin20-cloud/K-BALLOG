<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주현규 감독 프로필</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile-page.css">
</head>
<body>
    <div class="profile-container">
        <header class="profile-header">
            <img src="https://www.fupa.net/player/image/1024x768/sc-rheinbach-2016-17.jpg" alt="주현규 감독" class="player-image">
            <div class="player-info">
                <div class="player-name-container">
                    <span class="player-name">주현규</span>
                </div>
                <span class="player-position">감독</span>
            </div>
        </header>

        <main class="profile-main">
            <aside class="player-details-sidebar">
                <h2 class="details-heading">기본 정보</h2>
                <ul class="details-list">
                    <li>
                        <span class="label">국적</span>
                        <span class="value">대한민국</span>
                    </li>
                     <li>
                        <span class="label">역할</span>
                        <span class="value">감독</span>
                    </li>
                    <li>
                        <span class="label">생년월일</span>
                        <span class="value">1980년 5월 15일</span>
                    </li>
                </ul>
            </aside>
            <section class="player-performance-content">
                 <h2 class="performance-heading">감독 소개</h2>
                <p>풍부한 경험과 리더십을 바탕으로 팀을 이끌고 있습니다. 선수 개개인의 잠재력을 최대한 이끌어내는 데 중점을 둡니다.</p>
            </section>
        </main>
    </div>
</body>
</html>
