<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-translate="pageTitle">K-BALLOG - 아마추어 축구의 모든 것</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
                <div class="logo-icons">
                    <i class="fas fa-futbol soccer-ball-icon logo-icon"></i>
                    <i class="fas fa-chart-line data-icon logo-icon"></i>
                </div>
                <div class="location-selector">
                    <label for="location-select" data-translate="yourLocation">당신의 지역</label>
                    <div class="location-select-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="location-select">
                            <option value="" data-translate="select">선택</option>
                            <option value="seoul.html" data-translate="seoul">서울</option>
                            <option value="suwon.html" data-translate="suwon">수원</option>
                            <option value="incheon.html" data-translate="incheon">인천</option>
                            <option value="yongin.html" data-translate="yongin">용인</option>
                        </select>
                    </div>
                </div>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html" class="active" data-translate="navHome">홈</a></li>
                    <li><a href="match.html" data-translate="navMatches">경기</a></li>
                    <li><a href="search.html" data-translate="navSearch">검색</a></li>
                    <li><a href="news.html" data-translate="navNews">뉴스</a></li>
                    <li><a href="transfer.html" data-translate="navTransfer">이적</a></li>
                    <li><a href="community.html" data-translate="navCommunity">커뮤니티</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="auth-actions">
                    <button id="login-btn" class="btn-auth">로그인</button>
                    <button id="signup-btn" class="btn-auth">회원가입</button>
                    <div id="user-info" class="hidden">
                        <span id="user-greeting"></span>
                        <button id="logout-btn" class="btn-auth">로그아웃</button>
                    </div>
                </div>
                <div class="language-selector">
                    <div class="language-select-wrapper">
                        <i class="fas fa-globe"></i>
                        <select id="language-select">
                            <option value="ko">한국어</option>
                            <option value="en">English</option>
                            <option value="de">Deutsch</option>
                            <option value="es">Español</option>
                            <option value="ja">日本語</option>
                        </select>
                    </div>
                </div>
                <span class="mobile-location-label" data-translate="yourLocationMobile">당신의 지역:</span>
                <button class="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <!-- Hero Section -->
        <section class="card hero-section" style="background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1579952363873-27f3bade9f55?q=80&w=1935&auto=format&fit=crop') center/cover no-repeat;">
            <div class="hero-content">
                <h1 data-translate="heroTitle">우리 동네 축구 소식, K-BALLOG에서 전부 확인하세요!</h1>
                <p data-translate="heroSubtitle">지역별 리그 순위, 경기 결과, 최신 뉴스를 한눈에. 당신의 팀을 응원하고 K-BALLOG와 함께하세요.</p>
            </div>
        </section>
    </main>

    <!-- Login Modal -->
    <div id="login-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <h2>로그인</h2>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">이메일</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">비밀번호</label>
                    <input type="password" id="login-password" required>
                </div>
                <button type="submit" class="btn-primary">로그인</button>
            </form>
        </div>
    </div>

    <!-- Signup Role Choice Modal -->
    <div id="signup-role-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <h2>가입 유형을 선택하세요</h2>
            <div class="role-selection">
                <button id="player-signup-btn" class="btn-role"><i class="fas fa-user"></i> 선수로 가입</button>
                <button id="admin-signup-btn" class="btn-role"><i class="fas fa-user-shield"></i> 관리자로 가입</button>
            </div>
        </div>
    </div>

    <!-- Player Signup Modal -->
    <div id="player-signup-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <h2>선수 회원가입</h2>
            <form id="player-signup-form">
                <div class="form-group">
                    <label for="player-signup-email">이메일</label>
                    <input type="email" id="player-signup-email" required>
                </div>
                <div class="form-group">
                    <label for="player-signup-password">비밀번호</label>
                    <input type="password" id="player-signup-password" required>
                </div>
                 <div class="form-group">
                    <label for="player-signup-password-confirm">비밀번호 확인</label>
                    <input type="password" id="player-signup-password-confirm" required>
                </div>
                <button type="submit" class="btn-primary">가입하기</button>
            </form>
        </div>
    </div>

    <!-- Admin Signup Modal -->
    <div id="admin-signup-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <button class="close-btn">&times;</button>
            <h2>관리자 회원가입</h2>
            <form id="admin-signup-form">
                <div class="form-group">
                    <label for="admin-signup-email">이메일</label>
                    <input type="email" id="admin-signup-email" required>
                </div>
                <div class="form-group">
                    <label for="admin-signup-password">비밀번호</label>
                    <input type="password" id="admin-signup-password" required>
                </div>
                 <div class="form-group">
                    <label for="admin-signup-password-confirm">비밀번호 확인</label>
                    <input type="password" id="admin-signup-password-confirm" required>
                </div>
                <div class="form-group">
                    <label for="admin-auth-code">관리자 인증 코드</label>
                    <input type="text" id="admin-auth-code" required>
                </div>
                <button type="submit" class="btn-primary">가입하기</button>
            </form>
        </div>
    </div>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="#" data-translate="footerAbout">회사 소개</a>
                <a href="#" data-translate="footerTerms">이용 약관</a>
                <a href="#" data-translate="footerPrivacy">개인정보 처리방침</a>
                <a href="contact.html" data-translate="footerContact">문의하기</a>
            </div>
            <p data-translate="footerRights">&copy; 2024 K-BALLOG. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
