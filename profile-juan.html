<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
                <div class="logo-icons">
                    <i class="fas fa-futbol soccer-ball-icon logo-icon"></i>
                    <i class="fas fa-chart-line data-icon logo-icon"></i>
                </div>
            </div>
            <nav class="main-nav">

            <div class="header-actions">

                    <a href="signup.html" class="btn btn-primary">회원가입</a>
                    <a href="#" class="btn">로그인</a>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="profile-card card">
            <div class="profile-header">
                <img src="https://via.placeholder.com/150x150/000000/FFFFFF?text=J" alt="Juan 프로필 사진" class="profile-picture">
                <div class="profile-info">
                    <h1 class="player-name"><span class="player-number">1</span> Juan</h1>
                    <p class="player-team"><a href="team-inter-vamos.html">Inter Vamos</a></p>
                </div>
            </div>
            <div class="profile-body">
                <div class="profile-detail-item">
                    <span class="detail-label">포지션</span>
                    <span class="detail-value">골키퍼</span>
                </div>
                <div class="profile-detail-item">
                    <span class="detail-label">국적</span>
                    <span class="detail-value">미상</span>
                </div>
                <div class="profile-detail-item">
                    <span class="detail-label">생년월일</span>
                    <span class="detail-value">미상</span>
                </div>
            </div>
            <div class="profile-description">
                <h2>소개</h2>
                <p>Inter Vamos의 골키퍼. 자세한 정보는 아직 제공되지 않았습니다.</p>
            </div>
            <div class="profile-stats">
                <h2>2024 시즌 기록</h2>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value">-</span>
                        <span class="stat-label">경기</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value">-</span>
                        <span class="stat-label">클린시트</span>
                    </div>
                </div>
            </div>
            <div class="profile-actions">
                 <a href="team-inter-vamos.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> 팀으로 돌아가기</a>
            </div>
        </div>

            <div class="footer-links">
                <a href="#">회사 소개</a>
