<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>커뮤니티 - K-BALLOG</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
                <div class="logo-icons">
                    <i class="fas fa-futbol soccer-ball-icon logo-icon"></i>
                    <i class="fas fa-chart-line data-icon logo-icon"></i>
                </div>
                <div class="location-selector">
                    <label for="location-select">당신의 지역</label>
                    <div class="location-select-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="location-select">
                            <option value="seoul.html">서울</option>
                            <option value="suwon.html">수원</option>
                            <option value="incheon.html">인천</option>
                            <option value="yongin.html">용인</option>
                        </select>
                    </div>
                </div>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html">홈</a></li>
                    <li><a href="match.html">경기</a></li>
                    <li><a href="search.html">검색</a></li>
                    <li><a href="news.html">뉴스</a></li>
                    <li><a href="community.html" class="active">커뮤니티</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                 <div class="language-selector">
                    <div class="language-select-wrapper">
                        <i class="fas fa-globe"></i>
                        <select id="language-select">
                            <option value="ko">한국어</option>
                            <option value="en">English</option>
                            <option value="de">Deutsch</option>
                            <option value="es">Español</option>
                            <option value="ja">日本語</option>
                        </select>
                    </div>
                </div>
                <span class="mobile-location-label">당신의 지역:</span>
                <button class="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="community-section">
            <div class="community-header">
                <h2 class="section-heading"><i class="fas fa-users"></i> 커뮤니티 게시판</h2>
                <a href="create-post.html" class="create-post-btn"><i class="fas fa-edit"></i> 새 글 작성</a>
            </div>
            <div class="forum-posts">
                <!-- Posts will be dynamically loaded here -->
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="#">회사 소개</a>
                <a href="#">이용 약관</a>
                <a href="#">개인정보 처리방침</a>
                <a href="contact.html">문의하기</a>
            </div>
            <p>&copy; 2024 K-BALLOG. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
