<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carlos 감독 프로필</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile-page.css">
</head>
<body>
    <div class="profile-container">
        <header class="profile-header">
            <img src="https://via.placeholder.com/150x150/000000/FFFFFF?text=C" alt="Carlos" class="player-image">
            <div class="player-info">
                <div class="player-name-container">
                    <span class="player-name">Carlos</span>
                </div>
                <span class="player-position">감독</span>
            </div>
        </header>

        <main class="profile-main">
            <aside class="player-details-sidebar">
                <h2 class="details-heading">기본 정보</h2>
                <ul class="details-list">
                    <li>
                        <span class="label">국적</span>
                        <span class="value">미상</span>
                    </li>
                     <li>
                        <span class="label">역할</span>
                        <span class="value">감독</span>
                    </li>
                    <li>
                        <span class="label">생년월일</span>
                        <span class="value">미상</span>
                    </li>
                    <li>
                        <span class="label">나이</span>
                        <span class="value">미상</span>
                    </li>
                     <li>
                        <span class="label">키</span>
                        <span class="value">미상</span>
                    </li>
                    <li>
                        <span class="label">몸무게</span>
                        <span class="value">미상</span>
                    </li>
                </ul>
            </aside>
            <section class="player-performance-content">
                 <h2 class="performance-heading">지도자 경력</h2>
                 <ul class="details-list">
                    <li><span class="label">현재</span> <span class="value">Inter Vamos</span></li>
                </ul>
                <h2 class="performance-heading" style="margin-top: 2rem;">선수 경력</h2>
                <ul class="details-list">
                    <li><span class="label">미상</span> <span class="value">알 수 없음</span></li>
                </ul>
                <div class="back-to-team">
                    <a href="team-inter-vamos.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> 팀으로 돌아가기</a>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
