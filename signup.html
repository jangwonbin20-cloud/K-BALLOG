
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-BALLOG - 회원가입</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html" data-translate="navHome">홈</a></li>
                    <li><a href="match.html" data-translate="navMatches">경기</a></li>
                    <li><a href="search.html" data-translate="navSearch">검색</a></li>
                    <li><a href="news.html" data-translate="navNews">뉴스</a></li>
                    <li><a href="transfer.html" data-translate="navTransfer">이적</a></li>
                    <li><a href="community.html" data-translate="navCommunity">커뮤니티</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                 <div class="auth-buttons">
                    <a href="signup.html" class="btn btn-primary" id="signup-btn-main">회원가입</a>
                    <a href="#" class="btn" id="login-btn-main">로그인</a>
                </div>
                <div class="user-info hidden">
                    <span id="user-name-display"></span>
                    <a href="#" class="btn" id="logout-btn">로그아웃</a>
                </div>
            </div>
        </div>
    </header>

    <main class="signup-page-container">
        <div class="signup-form-container card">
            <h1 class="form-title">K-BALLOG 회원가입</h1>
            <p class="form-description">K-BALLOG에 오신 것을 환영합니다. 아래 정보를 입력해주세요.</p>
            <form id="signup-form">
                <div class="form-group">
                    <label for="signup-name">이름</label>
                    <input type="text" id="signup-name" required>
                </div>
                <div class="form-group">
                    <label for="signup-email">이메일</label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="form-group">
                    <label for="signup-password">비밀번호</label>
                    <input type="password" id="signup-password" required>
                </div>
                <div class="form-group">
                    <label>가입 유형</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="signup-role" value="player" checked> 선수
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="signup-role" value="admin"> 클럽 관리자
                        </label>
                    </div>
                </div>
                <div class="form-group hidden" id="admin-code-group">
                    <label for="admin-code">클럽 관리자 인증 코드</label>
                    <input type="password" id="admin-code" placeholder="인증 코드를 입력하세요">
                </div>
                <button type="submit" class="btn btn-primary btn-block">회원가입</button>
            </form>
            <div class="form-footer">
                <p>이미 계정이 있으신가요? <a href="#" id="login-link">로그인</a></p>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script>
        const roleRadios = document.querySelectorAll('input[name="signup-role"]');
        const adminCodeGroup = document.getElementById('admin-code-group');

        roleRadios.forEach(radio => {
            radio.addEventListener('change', () => {
                if (radio.value === 'admin') {
                    adminCodeGroup.classList.remove('hidden');
                } else {
                    adminCodeGroup.classList.add('hidden');
                }
            });
        });
    </script>
</body>
</html>
