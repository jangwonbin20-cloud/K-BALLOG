<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성북구30대상비단 - K-BALLOG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="seoul.html">서울</a></li>
                    <li><a href="suwon.html">수원</a></li>
                    <li><a href="incheon.html">인천</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" placeholder="검색...">
                    <button><i class="fas fa-search"></i></button>
                </div>
                <div class="hamburger"><i class="fas fa-bars"></i></div>
            </div>
        </div>
    </header>

    <main class="container team-profile-container">
        <div class="team-header card">
            <img src="images/team-sb-30s-logo.png" alt="성북구30대상비단 로고" class="team-logo">
            <div class="team-info">
                <h1>성북구30대상비단</h1>
                <p class="team-location">서울특별시 성북구</p>
            </div>
        </div>

        <div class="team-main-content card mt-4">
            <div class="tabs">
                <button class="tab-link active" onclick="openTab(event, 'squad')">선수단</button>
                <button class="tab-link" onclick="openTab(event, 'coach')">코칭 스태프</button>
            </div>

            <div id="squad" class="tab-content active">

                <div class="position-group">
                    <h3><i class="fas fa-shield-alt"></i> 수비수</h3>
                    <div class="profile-grid">
                        <a href="player-1.html" class="profile-card">
                            <img src="images/player-placeholder.png" alt="선수 사진">
                            <p>김성북</p>
                            <span>수비수</span>
                        </a>
                        <a href="player-2.html" class="profile-card">
                            <img src="images/player-placeholder.png" alt="선수 사진">
                            <p>이성북</p>
                            <span>수비수</span>
                        </a>
                    </div>
                </div>

                <div class="position-group">
                    <h3><i class="fas fa-running"></i> 미드필더</h3>
                    <div class="profile-grid">
                        <a href="player-3.html" class="profile-card">
                            <img src="images/player-placeholder.png" alt="선수 사진">
                            <p>박성북</p>
                            <span>미드필더</span>
                        </a>
                    </div>
                </div>

                <div class="position-group">
                    <h3><i class="fas fa-bullseye"></i> 공격수</h3>
                    <div class="profile-grid">
                        <a href="player-4.html" class="profile-card">
                            <img src="images/player-placeholder.png" alt="선수 사진">
                            <p>최성북</p>
                            <span>공격수</span>
                        </a>
                    </div>
                </div>
            </div>

            <div id="coach" class="tab-content">
                <div class="position-group">
                    <h3><i class="fas fa-user-tie"></i> 감독</h3>
                     <div class="profile-grid">
                        <a href="coach-1.html" class="profile-card">
                            <img src="images/player-placeholder.png" alt="감독 사진">
                            <p>홍성북</p>
                            <span>감독</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <div class="navigation-links mt-4">
            <a href="seoul-k7-seongbuk.html" class="nav-link-button">리그 페이지로 돌아가기</a>
        </div>

    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="#">회사소개</a>
                <a href="#">서비스소개</a>
                <a href="#">이용약관</a>
                <a href="#">개인정보처리방침</a>
            </div>
            <p>&copy; 2024 K-BALLOG. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
