<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carlos Gomez 프로필</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile-page.css">
</head>
<body>
    <div class="profile-container">
        <header class="profile-header">
            <img src="https://randomuser.me/api/portraits/men/4.jpg" alt="Carlos Gomez" class="player-image">
            <div class="player-info">
                <div class="player-name-container">
                    <span class="player-name">Carlos Gomez</span>
                </div>
                <span class="player-position">골키퍼</span>
            </div>
        </header>

        <main class="profile-main">
            <aside class="player-details-sidebar">
                <h2 class="details-heading">기본 정보</h2>
                <ul class="details-list">
                    <li><span class="label">국적</span> <span class="value">스페인</span></li>
                    <li><span class="label">역할</span> <span class="value">골키퍼</span></li>
                    <li><span class="label">생년월일</span> <span class="value">1994년 2월 18일</span></li>
                    <li><span class="label">나이</span> <span class="value">30세</span></li>
                    <li><span class="label">키</span> <span class="value">192 cm</span></li>
                    <li><span class="label">몸무게</span> <span class="value">88 kg</span></li>
                </ul>
            </aside>
            <section class="player-performance-content">
                 <h2 class="performance-heading">클럽 경력</h2>
                 <ul class="details-list">
                    <li><span class="label">2012-2015</span> <span class="value">Atlético Madrid B</span></li>
                    <li><span class="label">2015-2020</span> <span class="value">Getafe CF</span></li>
                    <li><span class="label">2020-2023</span> <span class="value">Real Betis</span></li>
                    <li><span class="label">2023-현재</span> <span class="value">Inter Vamos</span></li>
                 </ul>
                <div class="back-to-team">
                    <a href="team-inter-vamos.html" class="btn-secondary"><i class="fas fa-arrow-left"></i> 팀으로 돌아가기</a>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
