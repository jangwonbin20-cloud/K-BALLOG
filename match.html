
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-BALLOG - 경기</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
                <div class="logo-icons">
                    <i class="fas fa-futbol soccer-ball-icon logo-icon"></i>
                    <i class="fas fa-chart-line data-icon logo-icon"></i>
                </div>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html">홈</a></li>
                    <li><a href="match.html" class="active">경기</a></li>
                    <li><a href="search.html">검색</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="location-selector">
                    <label for="location-select">당신의 지역</label>
                    <div class="location-select-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="location-select">
                            <option value="index.html">전국</option>
                            <option value="seoul.html">서울</option>
                            <option value="suwon.html">수원</option>
                            <option value="incheon.html">인천</option>
                            <option value="yongin.html">용인</option>
                        </select>
                    </div>
                </div>
                <button class="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="match-list-section">
            <h2>전체 경기 일정</h2>
    
            <div class="match-date-group">
                <h3>2024년 7월 26일 (금)</h3>
                <div class="match-list-item card">
                    <div class="match-info">
                        <span class="team-name">서울 이랜드</span>
                        <img src="https://via.placeholder.com/40x40/1a1c23/ffffff?text=SE" alt="서울 이랜드 엠블럼">
                        <span class="score">20:00</span>
                        <img src="https://via.placeholder.com/40x40/1a1c23/ffffff?text=FA" alt="FC 안양 엠블럼">
                        <span class="team-name">FC 안양</span>
                    </div>
                    <div class="match-details">
                        <span>K리그2</span> | <span>서울올림픽주경기장</span>
                    </div>
                </div>
            </div>
    
            <div class="match-date-group">
                <h3>2024년 7월 27일 (토)</h3>
                <div class="match-list-item card">
                    <div class="match-info">
                        <span class="team-name">수원 FC</span>
                        <img src="https://via.placeholder.com/40x40/1a1c23/ffffff?text=SFC" alt="수원 FC 엠블럼">
                        <span class="score">1 - 2</span>
                         <img src="https://via.placeholder.com/40x40/1a1c23/ffffff?text=JHM" alt="전북 현대 모터스 엠블럼">
                        <span class="team-name">전북 현대 모터스</span>
                    </div>
                    <div class="match-details">
                        <span>K리그1</span> | <span>수원종합운동장</span>
                    </div>
                </div>
                 <div class="match-list-item card">
                    <div class="match-info">
                        <span class="team-name">강원 FC</span>
                        <img src="https://via.placeholder.com/40x40/1a1c23/ffffff?text=GFC" alt="강원 FC 엠블럼">
                        <span class="score">3 - 1</span>
                        <img src="https://via.placeholder.com/40x40/1a1c23/ffffff?text=SSB" alt="수원 삼성 블루윙즈 엠블럼">
                        <span class="team-name">수원 삼성 블루윙즈</span>
                    </div>
                    <div class="match-details">
                        <span>K리그1</span> | <span>춘천송암스포츠타운</span>
                    </div>
                </div>
            </div>
             <div class="match-date-group">
                <h3>2024년 7월 28일 (일)</h3>
                <div class="match-list-item card">
                    <div class="match-info">
                        <span class="team-name">포항 스틸러스</span>
                        <img src="https://via.placeholder.com/40x40/1a1c23/ffffff?text=PS" alt="포항 스틸러스 엠블럼">
                        <span class="score">vs</span>
                        <img src="https://via.placeholder.com/40x40/1a1c23/ffffff?text=UHD" alt="울산 HD FC 엠블럼">
                        <span class="team-name">울산 HD FC</span>
                    </div>
                    <div class="match-details">
                        <span>K리그1</span> | <span>포항스틸야드</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
