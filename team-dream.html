
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FC Dream - K-BALLOG</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="seoul.html">서울</a></li>
                    <li><a href="suwon.html">수원</a></li>
                    <li><a href="incheon.html">인천</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="search-bar">
                    <input type="text" placeholder="검색...">
                    <button><i class="fas fa-search"></i></button>
                </div>
                <div class="hamburger"><i class="fas fa-bars"></i></div>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="team-header-container">
            <div class="team-header-info">
                <img src="https://via.placeholder.com/150/1a1c23/f0f0f0?text=DREAM" alt="FC Dream" class="team-page-logo">
                <div>
                    <h1 class="team-page-name">FC Dream</h1>
                    <p class="team-page-meta">서울특별시 성북구 | 창단 2012년</p>
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-link active" onclick="openTab(event, 'players')">선수</button>
            <button class="tab-link" onclick="openTab(event, 'staff')">코칭 스탭</button>
            <button class="tab-link" onclick="openTab(event, 'info')">팀 정보</button>
        </div>

        <div id="players" class="tab-content active">
            <div class="card-grid">
                <!-- Players -->
                <a href="#" class="card-link">
                    <div class="card player-card">
                        <img src="https://via.placeholder.com/100/1a1c23/f0f0f0?text=FW" alt="공격수" class="player-photo">
                        <div class="player-info">
                            <h3 class="player-name">공격수1</h3>
                            <p class="player-position">공격수</p>
                        </div>
                    </div>
                </a>
                <a href="#" class="card-link">
                    <div class="card player-card">
                        <img src="https://via.placeholder.com/100/1a1c23/f0f0f0?text=MF" alt="미드필더" class="player-photo">
                        <div class="player-info">
                            <h3 class="player-name">미드필더1</h3>
                            <p class="player-position">미드필더</p>
                        </div>
                    </div>
                </a>
                <a href="#" class="card-link">
                    <div class="card player-card">
                        <img src="https://via.placeholder.com/100/1a1c23/f0f0f0?text=DF" alt="수비수" class="player-photo">
                        <div class="player-info">
                            <h3 class="player-name">수비수1</h3>
                            <p class="player-position">수비수</p>
                        </div>
                    </div>
                </a>
                <a href="#" class="card-link">
                    <div class="card player-card">
                        <img src="https://via.placeholder.com/100/1a1c23/f0f0f0?text=GK" alt="골키퍼" class="player-photo">
                        <div class="player-info">
                            <h3 class="player-name">골키퍼1</h3>
                            <p class="player-position">골키퍼</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div id="staff" class="tab-content">
            <div class="card-grid">
                <!-- Coaching Staff -->
                <a href="#" class="card-link">
                    <div class="card player-card">
                        <img src="https://via.placeholder.com/100/1a1c23/f0f0f0?text=Coach" alt="감독" class="player-photo">
                        <div class="player-info">
                            <h3 class="player-name">감독1</h3>
                            <p class="player-position">감독</p>
                        </div>
                    </div>
                </a>
            </div>
        </div>

        <div id="info" class="tab-content">
            <div class="card">
                <h3>팀 소개</h3>
                <p>FC Dream은 2012년에 창단된 팀으로, K7리그 서울 성북권역에서 활동하고 있습니다.</p>
                <h3>주요 연혁</h3>
                <ul>
                    <li>2012년: 팀 창단</li>
                </ul>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-links">
                <a href="#">회사소개</a>
                <a href="#">서비스소개</a>
                <a href="#">이용약관</a>
                <a href="#">개인정보처리방침</a>
            </div>
            <p>&copy; 2024 K-BALLOG. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
