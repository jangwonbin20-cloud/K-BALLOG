<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>이코치 프로필</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="profile-page.css">
</head>
<body>
    <div class="profile-container">
        <header class="profile-header">
            <img src="https://www.fupa.net/player/image/1024x768/sc-rheinbach-2016-17.jpg" alt="이코치" class="player-image">
            <div class="player-info">
                <div class="player-name-container">
                    <span class="player-name">이코치</span>
                </div>
                <span class="player-position">수석 코치</span>
            </div>
        </header>

        <main class="profile-main">
            <aside class="player-details-sidebar">
                <h2 class="details-heading">기본 정보</h2>
                <ul class="details-list">
                    <li>
                        <span class="label">국적</span>
                        <span class="value">대한민국</span>
                    </li>
                     <li>
                        <span class="label">역할</span>
                        <span class="value">수석 코치</span>
                    </li>
                    <li>
                        <span class="label">생년월일</span>
                        <span class="value">1985년 8월 20일</span>
                    </li>
                    <li>
                        <span class="label">나이</span>
                        <span class="value">38세</span>
                    </li>
                     <li>
                        <span class="label">키</span>
                        <span class="value">182 cm</span>
                    </li>
                    <li>
                        <span class="label">몸무게</span>
                        <span class="value">78 kg</span>
                    </li>
                </ul>
            </aside>
            <section class="player-performance-content">
                 <h2 class="performance-heading">지도자 경력</h2>
                 <ul class="details-list">
                    <li><span class="label">2018-2022</span> <span class="value">성북 주니어 FC 감독</span></li>
                    <li><span class="label">2023-현재</span> <span class="value">성북구30대상비단 수석코치</span></li>
                </ul>

                <h2 class="performance-heading" style="margin-top: 2rem;">선수 경력</h2>
                <ul class="details-list">
                    <li><span class="label">2005-2010</span> <span class="value">종로 FC</span></li>
                    <li><span class="label">2011-2015</span> <span class="value">중구 유나이티드</span></li>
                </ul>
            </section>
        </main>
    </div>
</body>
</html>
