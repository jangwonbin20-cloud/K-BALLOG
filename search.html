<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-BALLOG - 검색</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
                <div class="logo-icons">
                    <i class="fas fa-futbol soccer-ball-icon logo-icon"></i>
                    <i class="fas fa-chart-line data-icon logo-icon"></i>
                </div>
                <div class="location-selector">
                    <label for="location-select">당신의 지역</label>
                    <div class="location-select-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="location-select">
                            <option value="seoul.html">서울</option>
                            <option value="suwon.html">수원</option>
                            <option value="incheon.html">인천</option>
                        </select>
                    </div>
                </div>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html">홈</a></li>
                    <li><a href="match.html">경기</a></li>
                    <li><a href="search.html">검색</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="search-container">
            <h1>검색</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="검색어를 입력하세요...">
                <button id="searchButton"><i class="fas fa-search"></i></button>
            </div>
            <div id="filterContainer" class="filter-container"></div>
            <div id="resultsContainer" class="articles-grid"></div>
        </div>
    </main>

    <script src="search.js"></script>
</body>
</html>
