                <div class="location-selector">
                    <label for="location-select">당신의 지역</label>
                    <div class="location-select-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="location-select">
                            <option value="seoul.html">서울</option>
                            <option value="suwon.html">수원</option>
                            <option value="incheon.html">인천</option>
                            <option value="yongin.html">용인</option>
                        </select>
                    </div>
                </div>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html">홈</a></li>

                <button id="global-search-button"><i class="fas fa-search"></i> 검색</button>
            </div>
        </section>

        <section class="search-results-section">
            <h3 class="section-heading">검색 결과</h3>
            <div id="search-results-container" class="unified-grid">
                <p>검색어를 입력하고 검색 버튼을 클릭하세요.</p>
            </div>
        </section>
    </main>

    <footer class="main-footer">
