<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>양지 FC - K-BALLOG</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="team-page.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
                <div class="logo-icons">
                    <i class="fas fa-futbol soccer-ball-icon logo-icon"></i>
                    <i class="fas fa-chart-line data-icon logo-icon"></i>
                </div>
                <div class="location-selector">
                    <label for="location-select" data-translate="yourLocation">당신의 지역</label>
                    <div class="location-select-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <select id="location-select">
                            <option value="" data-translate="select">선택</option>
                            <option value="seoul.html" data-translate="seoul">서울</option>
                            <option value="suwon.html" data-translate="suwon">수원</option>
                            <option value="incheon.html" data-translate="incheon">인천</option>
                            <option value="yongin.html" data-translate="yongin">용인</option>
                        </select>
                    </div>
                </div>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html" data-translate="navHome">홈</a></li>
                    <li><a href="match.html" data-translate="navMatches">경기</a></li>
                    <li><a href="search.html" data-translate="navSearch">검색</a></li>
                    <li><a href="news.html" data-translate="navNews">뉴스</a></li>
                    <li><a href="transfer.html" data-translate="navTransfer">이적</a></li>
                    <li><a href="community.html" data-translate="navCommunity">커뮤니티</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <div class="auth-buttons">
                    <a href="signup.html" class="btn btn-primary" id="signup-btn-main">회원가입</a>
                    <a href="#" class="btn" id="login-btn-main">로그인</a>
                </div>
                <div class="user-info hidden">
                    <span id="user-name-display"></span>
                    <a href="#" class="btn" id="logout-btn">로그아웃</a>
                </div>
                <div class="language-selector">
                    <div class="language-select-wrapper">
                        <i class="fas fa-globe"></i>
                        <select id="language-select">
                            <option value="ko">한국어</option>
                            <option value="en">English</option>
                            <option value="de">Deutsch</option>
                            <option value="es">Español</option>
                            <option value="ja">日本語</option>
                        </select>
                    </div>
                </div>
                <span class="mobile-location-label" data-translate="yourLocationMobile">당신의 지역:</span>
                <button class="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="team-profile-header card">
            <img src="images/team-yangji-logo.png" alt="양지 FC 로고" class="team-logo">
            <div class="team-info">
                <h1>양지 FC</h1>
                <div class="team-meta">
                    <span><i class="fas fa-map-marker-alt"></i> 연고지: 서울 성북구</span>
                </div>
                <a href="seoul-k7-seongbuk.html" class="btn-primary"><i class="fas fa-trophy"></i> 리그 정보 보기</a>
            </div>
        </div>

        <div class="team-squad-section card">
            <h2 class="section-heading"><i class="fas fa-users"></i> 선수단</h2>
             <div class="squad-category">
                <h3><i class="fas fa-chalkboard-teacher"></i> 코칭 스탭</h3>
                <div class="player-grid">
                    <div class="player-card">
                        <span class="player-name">김감독</span>
                        <span class="player-position">감독</span>
                    </div>
                </div>
            </div>

            <div class="squad-category">
                <h3><i class="fas fa-futbol"></i> 골키퍼 (Goalkeepers)</h3>
                <div class="player-grid">
                    <div class="player-card">
                        <span class="player-number">1</span>
                        <span class="player-name">박골리</span>
                    </div>
                </div>
            </div>

            <div class="squad-category">
                <h3><i class="fas fa-shield-alt"></i> 수비수 (Defenders)</h3>
                <div class="player-grid">
                    <div class="player-card">
                        <span class="player-number">2</span>
                        <span class="player-name">김수비</span>
                    </div>
                </div>
            </div>

            <div class="squad-category">
                <h3><i class="fas fa-users"></i> 미드필더 (Midfielders)</h3>
                <div class="player-grid">
                    <div class="player-card">
                        <span class="player-number">6</span>
                        <span class="player-name">박미드</span>
                    </div>
                </div>
            </div>

            <div class="squad-category">
                <h3><i class="fas fa-bolt"></i> 공격수 (Forwards)</h3>
                <div class="player-grid">
                    <div class="player-card">
                        <span class="player-number">9</span>
                        <span class="player-name">이공격</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-links">
                 <a href="#" data-translate="footerAbout">회사 소개</a>
                <a href="#" data-translate="footerTerms">이용 약관</a>
                <a href="#" data-translate="footerPrivacy">개인정보 처리방침</a>
                <a href="contact.html" data-translate="footerContact">문의하기</a>
            </div>
            <p data-translate="footerRights">&copy; 2024 K-BALLOG. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
