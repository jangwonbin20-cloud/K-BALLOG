<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 글 작성 - K-BALLOG</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">K-BALLOG</a>
            </div>
            <nav class="main-nav">
                <ul class="nav-links">
                    <li><a href="index.html">홈</a></li>
                    <li><a href="match.html">경기</a></li>
                    <li><a href="search.html">검색</a></li>
                    <li><a href="news.html">뉴스</a></li>
                    <li><a href="community.html" class="active">커뮤니티</a></li>
                </ul>
            </nav>
            <div class="header-actions">
                <button class="hamburger"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="create-post-section">
            <h2 class="section-heading"><i class="fas fa-edit"></i> 새 글 작성</h2>
            <form id="create-post-form" class="card">
                <div class="form-group">
                    <label for="post-title">제목</label>
                    <input type="text" id="post-title" name="post-title" required>
                </div>
                <div class="form-group">
                    <label for="post-content">내용</label>
                    <textarea id="post-content" name="post-content" rows="10" required></textarea>
                </div>
                <div class="form-actions">
                    <a href="community.html" class="btn-secondary">취소</a>
                    <button type="submit" class="btn-primary">게시하기</button>
                </div>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
             <div class="footer-links">
                <a href="#">회사 소개</a>
                <a href="#">이용 약관</a>
                <a href="#">개인정보 처리방침</a>
                <a href="#">문의하기</a>
            </div>
            <p>&copy; 2024 K-BALLOG. All rights reserved.</p>
        </div>
    </footer>

    <script src="main.js"></script>
</body>
</html>
